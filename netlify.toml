# Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Publish directory (root of static site)
  publish = "."
  
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node version for functions
  NODE_VERSION = "18"

[functions]
  # Use esbuild for faster function bundling
  node_bundler = "esbuild"

# Redirect rules (if needed in the future)
# [[redirects]]
#   from = "/api/*"
#   to = "/.netlify/functions/:splat"
#   status = 200
